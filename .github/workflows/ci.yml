name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Agent API dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e "services/agent-api[dev]"

      - name: Run product checks
        run: pnpm check

      - name: Run canonical quality evals
        run: pnpm eval:run
